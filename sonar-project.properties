# SonarCloud project configuration for YSE Sound Engine
#
# Prerequisites before first scan:
#   1. Create a project in SonarCloud (sonarcloud.io) and note the projectKey and organization.
#   2. Replace the placeholder values for sonar.projectKey and sonar.organization below.
#   3. Add a SONAR_TOKEN secret to the GitHub repository (Settings → Secrets → Actions).
#      The secret name must match what is used in .github/workflows/ci.yml.
#
# The scan is driven by the GitHub Actions workflow; you do not need to run the
# sonar-scanner CLI locally.

# ── Project identity ──────────────────────────────────────────────────────────
# Replace with values from your SonarCloud project settings page.
sonar.projectKey=yvanvds_yse-soundengine
sonar.organization=yvanvds
sonar.projectName=YSE Sound Engine
sonar.projectVersion=1.0.77

# ── Source / test roots ───────────────────────────────────────────────────────
sonar.sources=YseEngine
sonar.tests=Tests

# ── Exclusions ────────────────────────────────────────────────────────────────
# Keep the analysis focused on the core engine.  All vendored dependencies,
# out-of-tree build directories, legacy platform projects, and Android projects
# are excluded.
sonar.exclusions=\
  dependencies/**,\
  build/**,\
  build-debug/**,\
  Demo.Windows.Native/**,\
  Yse.Android.Native/**,\
  YSEAndroidStudioNative/**,\
  Yse.Windows.Native/**,\
  YseCppRelease/**,\
  GeneratePackage/**,\
  cmake/**

# ── C++ analyser: compile commands ───────────────────────────────────────────
# compile_commands.json is generated by CMake when CMAKE_EXPORT_COMPILE_COMMANDS=ON
# (set unconditionally in the root CMakeLists.txt).  The coverage build in CI
# writes it to the build/ directory.
sonar.cfamily.compile-commands=build/compile_commands.json

# ── Coverage report ───────────────────────────────────────────────────────────
# Generated by gcovr --sonarqube in the CI workflow.
sonar.coverageReportPaths=coverage.xml

# ── Encoding ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

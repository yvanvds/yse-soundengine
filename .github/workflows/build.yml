name: SonarQube
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            portaudio19-dev \
            libsndfile1-dev \
            librtmidi-dev \
            gcovr \
            pulseaudio \
            pulseaudio-utils \
            libasound2-plugins \
            alsa-utils
      - name: Set up PulseAudio null sink for headless audio playback
        # Unlocks audio-thread DSP code paths (readInterleaved, oscillator
        # fast loops, sound playback lifecycle) in the integration test suite
        # so coverage reflects actual playback rather than the engine's idle
        # state.
        #
        # The Azure kernel on ubuntu-latest does not ship the snd-aloop or
        # snd-dummy modules in linux-modules-extra, so we run a user-space
        # PulseAudio daemon with a null sink and route ALSA through it via
        # libasound2-plugins' pulse PCM. PortAudio's ALSA backend then sees a
        # real, openable device and engineInitWithAudio() succeeds.
        run: |
          # Start PulseAudio in a way that survives the rest of the job; --start
          # backgrounds it, --exit-idle-time=-1 keeps it alive after the test
          # process exits.
          pulseaudio --start --exit-idle-time=-1
          # Give the daemon a beat to come up before pactl talks to it.
          sleep 1
          pactl load-module module-null-sink sink_name=ci_dummy_sink || true
          pactl set-default-sink ci_dummy_sink || true
          # Point ALSA's default PCM and ctl at PulseAudio so PortAudio's ALSA
          # backend enumerates the null sink as the default device.
          cat <<'EOF' | sudo tee /etc/asound.conf >/dev/null
          pcm.!default { type pulse }
          ctl.!default { type pulse }
          EOF
          pactl list short sinks || true
          aplay -l || true
      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DYSE_ENABLE_COVERAGE=ON
      - name: Run Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir "$BUILD_WRAPPER_OUT_DIR" cmake --build build
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --filter 'YseEngine/' \
            --filter 'Tests/' \
            --gcov-ignore-parse-errors \
            --sonarqube \
            --output coverage.xml \
            build
          echo "=== coverage.xml preview ===" && head -20 coverage.xml
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define "sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json"

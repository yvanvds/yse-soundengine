name: SonarQube
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            portaudio19-dev \
            libsndfile1-dev \
            librtmidi-dev \
            gcovr \
            jackd2 \
            alsa-utils
      - name: Set up JACK dummy backend for headless audio playback
        # Unlocks audio-thread DSP code paths (readInterleaved, oscillator
        # fast loops, sound playback lifecycle) in the integration test suite
        # so coverage reflects actual playback rather than the engine's idle
        # state.
        #
        # The Azure kernel on ubuntu-latest does not ship the snd-aloop /
        # snd-dummy ALSA modules and PulseAudio's null sink is not visible to
        # PortAudio's ALSA backend without a real card in /proc/asound/cards.
        # JACK's dummy driver provides a pure-userspace audio server that
        # PortAudio (built with JACK support in portaudio19-dev) connects to
        # directly, so engineInitWithAudio() succeeds and the callback fires.
        run: |
          # -R disables realtime scheduling (no CAP_SYS_NICE on CI runners);
          # -d dummy is the no-hardware backend; -r 44100 / -p 1024 / -n 2
          # match YSE's default sample rate and a small buffer for tests.
          jackd -R -d dummy -r 44100 -p 1024 -n 2 >/tmp/jackd.log 2>&1 &
          sleep 1
          # Diagnostic: report whether jackd is alive and what backends are
          # visible. Failures here don't abort the step; they surface in logs.
          jack_lsp -p 2>/dev/null || echo "jack_lsp: no jack server running yet"
          # PortAudio prefers JACK if PA_USE_JACK is compiled in. Set the
          # environment variable that controls the default Host API choice.
          echo "PA_ALSA_PLUGHW=1" >>"$GITHUB_ENV"
      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DYSE_ENABLE_COVERAGE=ON
      - name: Run Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir "$BUILD_WRAPPER_OUT_DIR" cmake --build build
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --filter 'YseEngine/' \
            --filter 'Tests/' \
            --gcov-ignore-parse-errors \
            --sonarqube \
            --output coverage.xml \
            build
          echo "=== coverage.xml preview ===" && head -20 coverage.xml
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define "sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json"

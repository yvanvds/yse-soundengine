name: SonarQube
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            portaudio19-dev \
            libsndfile1-dev \
            librtmidi-dev \
            gcovr
      # NOTE: headless audio playback (JACK dummy / PulseAudio null sink /
      # snd-aloop) was investigated to unlock audio-thread DSP coverage on
      # CI. None work reliably on GitHub Actions' Azure kernel:
      #   - snd-aloop / snd-dummy not in linux-modules-extra for the runner kernel.
      #   - PulseAudio null sink loads but is not visible to PortAudio's ALSA
      #     backend (/proc/asound/cards stays empty, so no card enumerates).
      #   - jackd2 dummy backend aborts on mlockall (CAP_IPC_LOCK + ulimit
      #     memlock=-1 not available to non-Docker GitHub Actions jobs).
      # A local reproduction is available via tools/ci-linux/Dockerfile.audio
      # which gets audio paths exercised under Docker with --cap-add IPC_LOCK
      # and --ulimit memlock=-1.
      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DYSE_ENABLE_COVERAGE=ON
      - name: Run Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir "$BUILD_WRAPPER_OUT_DIR" cmake --build build
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --filter 'YseEngine/' \
            --filter 'Tests/' \
            --gcov-ignore-parse-errors \
            --sonarqube \
            --output coverage.xml \
            build
          echo "=== coverage.xml preview ===" && head -20 coverage.xml
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define "sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json"

  build-android:
    # Cross-compile libyse.so + libyse_tests.so for each target ABI using the
    # NDK toolchain. Build-only — actually running the tests requires either an
    # emulator (KVM unavailable on GitHub-hosted runners) or a physical device,
    # both of which are deferred to a follow-up.
    name: Android build (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install host build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410 # v1.5.0
        with:
          ndk-version: r27
          local-cache: true
      - name: Configure CMake
        run: >
          cmake -B build-android -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=android-26
          -DCMAKE_BUILD_TYPE=Debug
          -DYSE_BUILD_TESTS=ON
      - name: Build libyse.so + libyse_tests.so
        run: cmake --build build-android --target yse yse_tests
      - name: Upload artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yse-android-${{ matrix.abi }}
          path: |
            build-android/bin/libyse.so
            build-android/bin/libyse_tests.so
          if-no-files-found: error
          retention-days: 14

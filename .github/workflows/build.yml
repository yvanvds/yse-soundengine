name: SonarQube
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    # Skip the PR-event run when the head branch is `dev` or `master`.
    # The push to either branch that brought the SHAs in has already run
    # this workflow against the same commits — running it again via the
    # PR trigger is pure duplication. PRs from feature branches still
    # run normally because their head_ref is neither 'dev' nor 'master'.
    #
    # Covers two release-flow PR types:
    # - dev → master release PR: head_ref == 'dev'
    # - master → dev post-release sync PR (carries the version bump
    #   commit back): head_ref == 'master'
    if: github.event_name == 'push' || (github.head_ref != 'dev' && github.head_ref != 'master')
    name: Build and analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            portaudio19-dev \
            libsndfile1-dev \
            librtmidi-dev \
            gcovr
      # NOTE: headless audio playback (JACK dummy / PulseAudio null sink /
      # snd-aloop) was investigated to unlock audio-thread DSP coverage on
      # CI. None work reliably on GitHub Actions' Azure kernel:
      #   - snd-aloop / snd-dummy not in linux-modules-extra for the runner kernel.
      #   - PulseAudio null sink loads but is not visible to PortAudio's ALSA
      #     backend (/proc/asound/cards stays empty, so no card enumerates).
      #   - jackd2 dummy backend aborts on mlockall (CAP_IPC_LOCK + ulimit
      #     memlock=-1 not available to non-Docker GitHub Actions jobs).
      # A local reproduction is available via tools/ci-linux/Dockerfile.audio
      # which gets audio paths exercised under Docker with --cap-add IPC_LOCK
      # and --ulimit memlock=-1.
      - name: Configure CMake
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DYSE_ENABLE_COVERAGE=ON
      - name: Run Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir "$BUILD_WRAPPER_OUT_DIR" cmake --build build
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
      - name: Run tests at forced 48 kHz
        # Cross-checks that DSP code and tests are rate-agnostic. Honoured by
        # Tests/main.cpp:applyForcedSampleRateFromEnv() which writes
        # YSE::SAMPLERATE before any DSP object is constructed. See #72.
        env:
          YSE_TEST_FORCED_RATE: "48000"
        run: ctest --test-dir build --output-on-failure
      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --filter 'YseEngine/' \
            --filter 'Tests/' \
            --gcov-ignore-parse-errors \
            --sonarqube \
            --output coverage.xml \
            build
          echo "=== coverage.xml preview ===" && head -20 coverage.xml
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define "sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json"

  build-android:
    # Cross-compile libyse.so + libyse_tests.so for each target ABI using the
    # NDK toolchain. Build-only — actually running the tests requires either an
    # emulator (KVM unavailable on GitHub-hosted runners) or a physical device,
    # both of which are deferred to a follow-up.
    #
    # Trigger gate: run on every push to master/dev (continuous coverage) and
    # on PRs that target master (release gate). Skip on PRs that target dev so
    # day-to-day feature work doesn't burn ~5 min of NDK cross-compile per push
    # — Android-specific regressions get caught at the dev → master step.
    # Additionally skip when the PR's head is `dev` (release PRs): the push
    # to dev that brought the SHA in has already run this workflow.
    if: github.event_name == 'push' || (github.base_ref == 'master' && github.head_ref != 'dev')
    name: Android build (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install host build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410 # v1.5.0
        with:
          ndk-version: r27
          local-cache: true
      - name: Configure CMake
        run: >
          cmake -B build-android -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=android-26
          -DCMAKE_BUILD_TYPE=Debug
          -DYSE_BUILD_TESTS=ON
      - name: Build libyse.so + libyse_tests.so
        run: cmake --build build-android --target yse yse_tests
      - name: Upload artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yse-android-${{ matrix.abi }}
          path: |
            build-android/bin/libyse.so
            build-android/bin/libyse_tests.so
          if-no-files-found: error
          retention-days: 14

  build-python:
    # Embedded-CPython acceptance (epic #119, follow-up to #124). Verifies the
    # YSE_ENABLE_PYTHON=ON build configures, links against the system libpython,
    # and passes the `python` ctest label on Linux/clang. The `clang+asan` leg
    # additionally runs that suite under AddressSanitizer + LeakSanitizer so the
    # 50-cycle init->close test catches a leaked script thread, lfQueue, or
    # traceback string — CPython's own interpreter-lifetime state is filtered
    # out by tools/lsan/python.supp.
    #
    # Same trigger gate as the `build` job: continuous on push to dev/master,
    # plus feature-branch PRs; skipped on release/sync PRs whose head is dev or
    # master (the push that landed those SHAs already ran this).
    if: github.event_name == 'push' || (github.head_ref != 'dev' && github.head_ref != 'master')
    name: Python build (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: clang
            preset: tests-debug-python
            bdir: build-tests-python
          - label: clang+asan
            preset: tests-debug-python-asan
            bdir: build-tests-python-asan
            asan: true
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install dependencies
        # python3-dev: the libpython we embed (find_package Python3 Development.Embed).
        # libclang-rt-dev: clang's compiler-rt, which ships libclang_rt.asan — not
        # pulled in by the base clang package, so the ASan leg fails to link without it.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            libclang-rt-dev \
            portaudio19-dev \
            libsndfile1-dev \
            librtmidi-dev \
            python3-dev
      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Run python suite
        # ctest -L python runs the yse_tests_python entry in its own process, so
        # the ASan leg gets a clean Py_Initialize/Py_Finalize re-entry boundary
        # for the 50-cycle leak check. The suppressions path MUST be absolute:
        # the test binary's working directory is <bdir>/bin, so a repo-relative
        # path resolves wrong and ASan aborts with "failed to read suppressions
        # file". Empty (and thus ignored) on the non-ASan leg.
        env:
          LSAN_OPTIONS: ${{ matrix.asan && format('suppressions={0}/tools/lsan/python.supp', github.workspace) || '' }}
        run: ctest --test-dir ${{ matrix.bdir }} -L python --output-on-failure

  build-sanitizers:
    # Patcher concurrency acceptance gate (issue #229, epic #189): drive
    # concurrent live-edit + render of a patcher under Thread- and
    # AddressSanitizer so a regression in the wait-free graph model (a data race
    # or a use-after-free of a retired GraphState/object on the audio thread) is
    # caught. Both legs build only the tests-<san> preset and run just the
    # patcher concurrency test (the preset filters by name). Local repro:
    # tools/ci-linux/Dockerfile.sanitizers.
    #
    # Same trigger gate as the `build` job: continuous on push to dev/master,
    # plus feature-branch PRs; skipped on release/sync PRs whose head is dev or
    # master (the push that landed those SHAs already ran this).
    if: github.event_name == 'push' || (github.head_ref != 'dev' && github.head_ref != 'master')
    name: Sanitizers (${{ matrix.san }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        san: [tsan, asan]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install dependencies
        # libclang-rt-dev ships libclang_rt.{asan,tsan}; not pulled in by the base
        # clang package, so the sanitizer legs fail to link without it.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            libclang-rt-dev \
            portaudio19-dev \
            libsndfile1-dev \
            librtmidi-dev
      - name: Lower ASLR entropy for the sanitizer runtime
        # ubuntu-latest runners ship vm.mmap_rnd_bits=32, which the ASan/TSan
        # shadow mapping cannot accommodate ("unexpected memory mapping" abort).
        # 28 is the entropy the sanitizer runtimes are built for.
        run: sudo sysctl -w vm.mmap_rnd_bits=28
      - name: Configure (tests-${{ matrix.san }})
        run: cmake --preset tests-${{ matrix.san }}
      - name: Build
        run: cmake --build --preset tests-${{ matrix.san }}
      - name: Run patcher concurrency gate
        # The tests-${san} test preset filters to yse_tests_patcher_concurrency
        # and sets ASAN_OPTIONS=detect_leaks=0 on the asan leg (the process-global
        # thread pools / named bus are intentionally never torn down).
        run: ctest --preset tests-${{ matrix.san }} --output-on-failure
      - name: Run static-teardown UAF gate (lifecycle suite, issue #298)
        # The lifecycle suite deliberately leaves a SOUND::implementationObject
        # alive at engine teardown; its destructor used to read a freed parent
        # channel impl during static destruction (issue #298), a flaky SIGSEGV
        # that normal builds miss because it is heap-layout dependent. Run the
        # isolated lifecycle process under AddressSanitizer so that
        # use-after-free is caught deterministically. Asan leg only.
        # detect_leaks=0 for the same reason as the patcher gate above (the
        # process-global pools/bus are never torn down); this gate is about UAF.
        if: matrix.san == 'asan'
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build-tests-asan -R yse_tests_lifecycle --output-on-failure
